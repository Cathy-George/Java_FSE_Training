<div class="login-wrapper fade-in">
  <div class="login-card">
    <div class="login-header">
      <span class="auth-icon">🔐</span>
      <h2 class="login-title">Student Portal Gatekeeper</h2>
      <p class="login-subtitle">Simulate authentication checks to verify AuthGuard route protections</p>
    </div>
    
    <div class="auth-status-box" [class.authenticated]="isLoggedIn">
      <span class="status-indicator"></span>
      <span class="status-text">
        System Access: <strong>{{ isLoggedIn ? 'AUTHORIZED' : 'UNAUTHORIZED / GUEST' }}</strong>
      </span>
    </div>
    
    <div class="login-actions">
      <button (click)="toggleLogin()" class="btn-auth-toggle" [class.btn-logout]="isLoggedIn" id="authToggleBtn">
        {{ isLoggedIn ? 'Terminate Session (Log Out)' : 'Establish Session (Log In)' }}
      </button>
    </div>
  </div>
</div>
